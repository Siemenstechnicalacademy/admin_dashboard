<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STA Admin | Full Question Bank Engine</title>
    <style>
        :root {
            --primary: #1a252f;
            --accent: #3498db;
            --sidebar-bg: #2c3e50;
            --btn-green: #27ae60;
            --btn-red: #e74c3c;
            --btn-gray: #7f8c8d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; overflow: hidden; }

        /* --- PDF/PRINT OPTIMIZATION --- */
        @media print {
            .sidebar, .tab-btn, .clear-btn, .export-btn, .generate-btn, .logo, label, select, .no-print, hr { 
                display: none !important; 
            }
            .main-content { padding: 0; overflow: visible; width: 100%; position: absolute; left: 0; top: 0; }
            body { background: white; display: block; }
            .q-card { 
                box-shadow: none !important; 
                border: 1px solid #ddd !important; 
                page-break-inside: avoid; 
                margin-bottom: 15px;
            }
            #results-section { display: block !important; }
            #designer-section { display: none !important; }
            h1 { font-size: 20px; color: black; }
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px; background-color: var(--sidebar-bg); color: white;
            padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            border-right: 1px solid #3e4f5f;
        }
        .logo { font-size: 18px; font-weight: bold; color: var(--accent); border-bottom: 1px solid #3e4f5f; padding-bottom: 10px; margin-bottom: 5px; }
        label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #bdc3c7; display: block; margin-bottom: 5px; }
        select {
            width: 100%; padding: 10px; border-radius: 5px; border: none;
            background-color: #34495e; color: white; outline: none; font-size: 14px;
        }

        /* --- CUSTOM CHECKBOX DROPDOWN --- */
        .multiselect { width: 100%; position: relative; }
        .selectBox { position: relative; }
        .selectBox select { width: 100%; font-weight: bold; cursor: pointer; }
        .overSelect { position: absolute; left: 0; right: 0; top: 0; bottom: 0; }
        #checkboxes {
            display: none; border: 1px solid #3e4f5f; background-color: #34495e;
            max-height: 180px; overflow-y: auto; border-radius: 0 0 5px 5px;
            position: absolute; width: 100%; z-index: 10;
        }
        #checkboxes label {
            display: block; color: white; padding: 8px; text-transform: none;
            font-weight: normal; font-size: 13px; cursor: pointer; border-bottom: 1px solid #3e4f5f;
        }
        #checkboxes label:hover { background-color: var(--accent); }
        #checkboxes input { margin-right: 10px; }

        .generate-btn {
            background-color: var(--btn-green); color: white; border: none;
            padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }
        .clear-btn {
            background-color: var(--btn-red); color: white; border: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;
            font-size: 12px; transition: 0.3s;
        }
        .export-btn {
            background-color: var(--accent); color: white; border: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;
            font-size: 12px; display: inline-flex; align-items: center; gap: 8px;
        }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .q-card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--accent); }
        .tab-btn { background: #34495e; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px 5px 0 0; font-weight: bold; margin-right: 5px;}
        .tab-btn.active { background: #f4f7f6; color: var(--primary); border: 1px solid #ddd; border-bottom: none; }
    </style>
</head>
<body>

    <aside class="sidebar no-print">
        <div class="logo">STA ADMIN DASHBOARD</div>
        <div>
            <label>Select Batch</label>
            <select id="examSession">
                <option value="61st EA">61st EA</option>
                <option value="61st EB">61st EB</option>
            </select>
        </div>
        <div>
            <label>Select Semester</label>
            <select id="semester" onchange="updateMainTopics()">
                <option value="">-- Select Semester --</option>
                <option value="sem1">I SEMESTER</option>
                <option value="sem2">II SEMESTER</option>
                <option value="sem3">III SEMESTER</option>
                <option value="sem4">IV SEMESTER</option>
            </select>
        </div>
        <div>
            <label>Main Topic (Chapter)</label>
            <select id="mainTopic">
                <option value="">Select Semester First</option>
            </select>
        </div>
        <div>
            <label>Question Quantity (0-50)</label>
            <div class="multiselect">
                <div class="selectBox" onclick="showCheckboxes()">
                    <select><option>Select Amount</option></select>
                    <div class="overSelect"></div>
                </div>
                <div id="checkboxes"></div>
            </div>
        </div>
        <button class="generate-btn" onclick="generateFromBank()">GENERATE QUESTION SET</button>
    </aside>

    <main class="main-content">
        <div style="display: flex;" class="no-print">
            <button class="tab-btn active" id="btn-designer" onclick="switchTab('designer')">Examination Designer</button>
            <button class="tab-btn" id="btn-results" onclick="switchTab('results')">Student Performance</button>
        </div>
        
        <div id="designer-section" style="background: white; padding: 20px; border: 1px solid #ddd; border-top: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <h1 style="font-size: 28px; color: var(--primary);">Question Explorer</h1>
                    <span id="selectedCount" style="background: #bdc3c7; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold;">0 Selected</span>
                </div>
                <button class="no-print" onclick="loadTopicQuestions()" style="background-color: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px;">Load Questions</button>
            </div>
            <p id="currentTopicLabel" style="color: #555; font-weight: bold; margin-bottom: 15px;">Select Questions from: None</p>
            <hr style="margin-bottom: 20px; border: 0.5px solid #eee;">
            <div id="questionDisplay">
                <p style="color: #888; text-align: center; padding: 40px;">Select a semester and topic, then click "Load Questions" to begin.</p>
            </div>
        </div>

        <div id="results-section" style="display: none; background: white; padding: 20px; border: 1px solid #ddd; border-top: none;">
            <div class="results-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>Live Student Results</h1>
                <div style="display: flex; gap: 10px;">
                    <button class="export-btn no-print" onclick="generateFullPDFReport()">
                        <span>📥</span> <b>EXPORT TO PDF</b>
                    </button>
                    <button class="clear-btn no-print" onclick="clearPerformanceData()">CLEAR ALL RESULTS</button>
                </div>
            </div>
            <hr style="margin: 20px 0; border: 0.5px solid #ddd;" class="no-print">
            <div id="studentList">
                <p style="color: #888;">No submissions yet...</p>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApnWnlnrTFQw5hsHVvjnK0kvwqIh3Nh5E",
            authDomain: "sta-question-bank.firebaseapp.com",
            databaseURL: "https://sta-question-bank-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "sta-question-bank",
            storageBucket: "sta-question-bank.firebasestorage.app",
            messagingSenderId: "632844417227",
            appId: "1:632844417227:web:6b60831113d49c18fd834e"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const semesterData = {
            sem1: ["1.1 Unit and Measurements", "1.2 Fraction & Decimal", "1.3 Square Root", "1.4 Ratio & Proportion", "1.5 Percentage", "1.6 Material Science", "1.7 Mass, Weight & Density", "1.8 Speed and Velocity", "1.9 Work, Power and Energy"],
            sem2: ["2.1 Algebra", "2.2 Mensuration", "2.3 Volume and Weight", "2.4 Trigonometry", "2.5 Simple Machines", "2.6 Heat and Temperature", "2.7 Basic Electricity"],
            sem3: ["3.1 Algebra", "3.2 Square Root", "3.3 Electrical Components Connection", "3.4 AC Circuits", "3.5 Strength of Material", "3.6 Material Science", "3.7 Magnetism", "3.8 Hydrostatics"],
            sem4: ["4.1 Number Systems", "4.2 Estimating and Costing", "4.3 Volume and Weight", "4.4 Graph", "4.5 Applied Mathematics - I", "4.6 Applied Mathematics - II", "4.7 Friction", "4.8 Hydrostatics", "4.9 Heat Treatment", "4.10 Statics"]
        };

        function switchTab(tab) {
            document.getElementById('designer-section').style.display = tab === 'designer' ? 'block' : 'none';
            document.getElementById('results-section').style.display = tab === 'results' ? 'block' : 'none';
            document.getElementById('btn-designer').classList.toggle('active', tab === 'designer');
            document.getElementById('btn-results').classList.toggle('active', tab === 'results');
        }

        // FIXED PDF Export Function
        function generateFullPDFReport() {
            const listDiv = document.getElementById('studentList');
            if (listDiv.innerText.includes("No submissions")) {
                alert("No data to export!");
                return;
            }
            switchTab('results'); // Ensure UI is updated
            setTimeout(() => { window.print(); }, 500);
        }

        database.ref('exam_results').on('value', (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = "";

            if (!data) {
                listDiv.innerHTML = "<p style='color:#888;'>No submissions yet...</p>";
                return;
            }

            for (let id in data) {
                const student = data[id];
                let fullDetailsHtml = "";

                if (student.details && Array.isArray(student.details)) {
                    student.details.forEach((item, index) => {
                        const isCorrect = item.status;
                        const statusColor = isCorrect ? "#27ae60" : "#e74c3c";
                        const bgColor = isCorrect ? "#f0fff4" : "#fff5f5";
                        
                        fullDetailsHtml += `
                            <div style="padding: 12px; margin-top: 10px; border-radius: 6px; background-color: ${bgColor}; border: 1px solid ${statusColor}33;">
                                <p style="margin-bottom: 5px;"><strong>Q${index + 1}:</strong> ${item.question}</p>
                                <div style="font-size: 13px; display: flex; gap: 15px;">
                                    <span>Student Chose: <strong style="color:${statusColor}">${item.userSelection}</strong></span>
                                    ${!isCorrect ? `<span>Correct: <strong style="color:#27ae60">${item.correctAnswer}</strong></span>` : ''}
                                </div>
                            </div>`;
                    });
                }

                listDiv.innerHTML += `
                    <div class="q-card" style="margin-bottom: 30px; border-left: 6px solid var(--accent);">
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #eee; padding-bottom:15px; margin-bottom:15px;">
                            <div>
                                <strong style="font-size: 20px; color: var(--primary);">${student.name}</strong>
                                <span style="margin-left:10px; background: #3498db; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">TC: ${student.tcNumber || student.Tcnumber || 'N/A'}</span>
                                <div style="margin-top:5px;">
                                    <span style="background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #555;">BATCH: ${student.batch || 'N/A'}</span>
                                    <small style="color:#888; margin-left: 10px;">Submitted: ${student.submittedAt}</small>
                                </div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:22px; font-weight:bold; color:var(--accent);">${student.score}/${student.totalQuestions || '20'}</div>
                                <div style="font-size:12px; color:#666;">Total Score (${student.percentage || 0}%)</div>
                            </div>
                        </div>
                        <div class="details-section">
                            <label style="color:var(--primary); font-size: 11px; margin-bottom: 10px; display:block;">QUESTION BREAKDOWN</label>
                            ${fullDetailsHtml}
                        </div>
                    </div>`;
            }
        });

        function clearPerformanceData() {
            if (confirm("Permanently delete ALL student exam results?")) {
                database.ref('exam_results').remove()
                    .then(() => alert("Database cleared."))
                    .catch((err) => alert("Error: " + err.message));
            }
        }

        const checkboxContainer = document.getElementById("checkboxes");
        for (let i = 0; i <= 50; i++) {
            const label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" name="qty" value="${i}" /> ${i} Questions`;
            checkboxContainer.appendChild(label);
        }

        function updateMainTopics() {
            const sem = document.getElementById('semester').value;
            const topicSelect = document.getElementById('mainTopic');
            topicSelect.innerHTML = "";
            if(sem && semesterData[sem]) {
                semesterData[sem].forEach(topic => {
                    const opt = document.createElement('option');
                    opt.value = topic; opt.innerHTML = topic;
                    topicSelect.appendChild(opt);
                });
            } else {
                topicSelect.innerHTML = "<option>Select Semester First</option>";
            }
        }

        let expanded = false;
        function showCheckboxes() {
            const checkboxes = document.getElementById("checkboxes");
            checkboxes.style.display = expanded ? "none" : "block";
            expanded = !expanded;
        }

        let selectedQuestions = [];
        function loadTopicQuestions() {
            const sem = document.getElementById('semester').value;
            const chapter = document.getElementById('mainTopic').value;
            if (!chapter || chapter.includes("Select")) return;

            document.getElementById('currentTopicLabel').innerText = `Select Questions from: ${chapter}`;
            const display = document.getElementById('questionDisplay');
            display.innerHTML = `<div style="text-align:center; padding:40px;"><span style="color: #3498db; font-weight: bold;">Loading Bank...</span></div>`;

            database.ref('questions/' + sem + '/' + chapter).once('value', (snapshot) => {
                const questions = snapshot.val();
                display.innerHTML = ""; 
                selectedQuestions = [];
                updateSelectedCounter();

                if (!questions) {
                    display.innerHTML = `<p style="color:red; text-align:center; padding:20px;">No questions found.</p>`;
                    return;
                }

                Object.keys(questions).forEach((key) => {
                    const q = questions[key];
                    display.innerHTML += `
                        <div class="q-card" style="display: flex; justify-content: space-between; align-items: flex-start; border-left: 5px solid #27ae60;">
                            <div style="flex: 1;">
                                <p><strong>Q:</strong> ${q.question || q.questionText}</p>
                                <p style="font-size: 13px; color: #7f8c8d;">${q.optionA} | ${q.optionB} | ${q.optionC} | ${q.optionD}</p>
                                <p style="color: #27ae60; font-weight: bold;">✓ ${q.answer || q.correctOption}</p>
                            </div>
                            <div style="padding-left: 20px;">
                                <input type="checkbox" style="transform: scale(1.4);" onclick="toggleSelection('${key}', this)">
                            </div>
                        </div>`;
                });
            });
        }

        function toggleSelection(id, cb) {
            if (cb.checked) selectedQuestions.push(id);
            else selectedQuestions = selectedQuestions.filter(i => i !== id);
            updateSelectedCounter();
        }

        function updateSelectedCounter() {
            const counter = document.getElementById('selectedCount');
            counter.innerText = `${selectedQuestions.length} Selected`;
            counter.style.background = selectedQuestions.length > 0 ? "#27ae60" : "#bdc3c7";
        }

        function generateFromBank() {
            const chapter = document.getElementById('mainTopic').value;
            if (!chapter || selectedQuestions.length === 0) {
                alert("Select Chapter and specific questions first!");
                return;
            }
            alert("Exam generation for " + selectedQuestions.length + " questions initiated.");
        }
    </script>
</body>
</html>
